# Reference tftpd-hpa configuration for the wolfIP TFTP interop test.
#
# This file is a documentation template, not a runtime input: it
# documents the canonical settings the interop test exercises so the
# same daemon can be dropped in as a system service later. The
# interop test (src/test/test_tftp_interop.c) does NOT parse this
# file — it embeds the equivalent flags directly in its execl() of
# /usr/sbin/in.tftpd. Keep this file and the test's hardcoded flags
# in sync by hand when either changes.
#
# Follows the /etc/default/tftpd-hpa format shipped by the Debian /
# Ubuntu tftpd-hpa package.

# Run in.tftpd as this user. The interop test runs as root (it needs to
# set up the tap interface) and recent in.tftpd refuses to start as
# root unless this is set explicitly.
TFTP_USERNAME="root"

# Root directory served over TFTP. The test recreates this dir before
# launching tftpd-hpa and drops the canonical fixture file inside it.
TFTP_DIRECTORY="/tmp/wolfip-tftp-root"

# Bind address for in.tftpd. Must match HOST_STACK_IP in config.h so the
# wolfIP stack can reach the daemon over the tap link, and uses a
# non-privileged port so the daemon can run without further setup.
TFTP_ADDRESS="10.10.10.1:6969"

# Standalone listen mode (no inetd), verbose logging on stderr, allow
# the wolfIP client to send block/timeout/tsize/windowsize options.
TFTP_OPTIONS="--listen --foreground --verbose"
